<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Хелпдеск · VPN Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0d0d12;
      color: #f1f1f5;
      -webkit-font-smoothing: antialiased;
    }
    .font-mono, .tabular-nums { font-variant-numeric: tabular-nums; }
    code, .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 999px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    input[type=range] { height: 4px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2/dist/lottie-player.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="/static/components.jsx"></script>
  <script type="text/babel" src="/static/dialogs.jsx"></script>
  <script type="text/babel" src="/static/statistics.jsx"></script>
  <script type="text/babel" src="/static/settings.jsx"></script>
  <script type="text/babel" src="/static/servers.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Auth token ────────────────────────────────────────────────────────────

    let _token = localStorage.getItem("hd_token") || "";
    let _authExpiredCb = null;

    function setToken(t) {
      _token = t;
      t ? localStorage.setItem("hd_token", t) : localStorage.removeItem("hd_token");
    }

    // ── API helpers ───────────────────────────────────────────────────────────

    async function apiFetch(method, path, body) {
      const headers = {};
      if (_token) headers["Authorization"] = "Bearer " + _token;
      let fetchBody;
      if (method === "UPLOAD" && body instanceof File) {
        const fd = new FormData();
        fd.append("file", body);
        fetchBody = fd;
        method = "POST";
      } else if (body !== undefined) {
        headers["Content-Type"] = "application/json";
        fetchBody = JSON.stringify(body);
      }
      const res = await fetch(path, { method, headers, body: fetchBody });
      if (res.status === 401) {
        setToken("");
        if (_authExpiredCb) _authExpiredCb();
        throw Object.assign(new Error("Unauthorized"), { status: 401 });
      }
      if (!res.ok) {
        let errBody = null;
        try { errBody = await res.json(); } catch {}
        throw Object.assign(new Error(`${res.status} ${res.statusText}`), { status: res.status, ...(errBody || {}) });
      }
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    window.apiFetch = apiFetch;

    async function apiGet(path)        { return apiFetch("GET",  path);       }
    async function apiPost(path, body) { return apiFetch("POST", path, body); }

    // ── LoginScreen ───────────────────────────────────────────────────────────

    function LoginScreen({ onLogin }) {
      const [tg,       setTg]       = useState("");
      const [password, setPassword] = useState("");
      const [loading,  setLoading]  = useState(false);
      const [err,      setErr]      = useState(null);

      async function submit(e) {
        e?.preventDefault();
        setLoading(true);
        setErr(null);
        try {
          const handle = tg.startsWith("@") ? tg : "@" + tg;
          await onLogin(handle, password);
        } catch {
          setErr("Неверный Telegram или пароль");
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="h-full flex items-center justify-center bg-[#0d0d12]">
          <div className="w-full max-w-sm px-4">
            <div className="text-center mb-8">
              <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#4F8EF7] to-[#A855F7] mx-auto flex items-center justify-center text-white font-bold text-2xl mb-4">Х</div>
              <div className="text-xl font-semibold text-[#f1f1f5]">VPN Хелпдеск</div>
              <div className="text-sm text-[#6b7280] mt-1">Войдите в аккаунт оператора</div>
            </div>
            <form onSubmit={submit} className="bg-[#13131a] border border-[#2a2a3a] rounded-2xl p-6 space-y-4">
              <div>
                <label className="block text-xs text-[#6b7280] mb-1.5">Telegram username</label>
                <input autoFocus value={tg} onChange={(e) => setTg(e.target.value)} placeholder="@username"
                  className="w-full bg-[#0d0d12] border border-[#2a2a3a] rounded-lg px-3 py-2.5 text-sm text-[#f1f1f5] placeholder:text-[#6b7280] focus:outline-none focus:border-[#4F8EF7]/50 font-mono" />
              </div>
              <div>
                <label className="block text-xs text-[#6b7280] mb-1.5">Пароль</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••"
                  className="w-full bg-[#0d0d12] border border-[#2a2a3a] rounded-lg px-3 py-2.5 text-sm text-[#f1f1f5] placeholder:text-[#6b7280] focus:outline-none focus:border-[#4F8EF7]/50" />
              </div>
              {err && (
                <div className="text-xs text-[#ef4444] bg-[#ef4444]/10 border border-[#ef4444]/20 rounded-lg px-3 py-2">
                  {err}
                </div>
              )}
              <button type="submit" disabled={loading || !tg || !password}
                className="w-full py-2.5 rounded-lg bg-[#4F8EF7] hover:bg-[#3d7ce8] text-white font-semibold text-sm transition disabled:opacity-40 disabled:cursor-not-allowed">
                {loading ? "Вход..." : "Войти"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── SetupScreen ───────────────────────────────────────────────────────────

    function SetupScreen({ onSetup }) {
      const [name,     setName]     = useState("");
      const [tg,       setTg]       = useState("");
      const [password, setPassword] = useState("");
      const [password2,setPassword2]= useState("");
      const [loading,  setLoading]  = useState(false);
      const [err,      setErr]      = useState(null);

      async function submit(e) {
        e?.preventDefault();
        if (password !== password2) { setErr("Пароли не совпадают"); return; }
        if (password.length < 6)    { setErr("Пароль — минимум 6 символов"); return; }
        setLoading(true);
        setErr(null);
        try {
          const handle = tg.startsWith("@") ? tg : "@" + tg;
          await onSetup(name.trim(), handle, password);
        } catch {
          setErr("Ошибка создания аккаунта");
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="h-full flex items-center justify-center bg-[#0d0d12]">
          <div className="w-full max-w-sm px-4">
            <div className="text-center mb-8">
              <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#4F8EF7] to-[#A855F7] mx-auto flex items-center justify-center text-white font-bold text-2xl mb-4">Х</div>
              <div className="text-xl font-semibold text-[#f1f1f5]">Первый запуск</div>
              <div className="text-sm text-[#6b7280] mt-1">Создайте аккаунт администратора</div>
            </div>
            <form onSubmit={submit} className="bg-[#13131a] border border-[#2a2a3a] rounded-2xl p-6 space-y-4">
              <div>
                <label className="block text-xs text-[#6b7280] mb-1.5">Имя</label>
                <input autoFocus value={name} onChange={(e) => setName(e.target.value)} placeholder="Алексей Петров"
                  className="w-full bg-[#0d0d12] border border-[#2a2a3a] rounded-lg px-3 py-2.5 text-sm text-[#f1f1f5] placeholder:text-[#6b7280] focus:outline-none focus:border-[#4F8EF7]/50" />
              </div>
              <div>
                <label className="block text-xs text-[#6b7280] mb-1.5">Telegram username</label>
                <input value={tg} onChange={(e) => setTg(e.target.value)} placeholder="@username"
                  className="w-full bg-[#0d0d12] border border-[#2a2a3a] rounded-lg px-3 py-2.5 text-sm text-[#f1f1f5] placeholder:text-[#6b7280] focus:outline-none focus:border-[#4F8EF7]/50 font-mono" />
              </div>
              <div>
                <label className="block text-xs text-[#6b7280] mb-1.5">Пароль</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••"
                  className="w-full bg-[#0d0d12] border border-[#2a2a3a] rounded-lg px-3 py-2.5 text-sm text-[#f1f1f5] placeholder:text-[#6b7280] focus:outline-none focus:border-[#4F8EF7]/50" />
              </div>
              <div>
                <label className="block text-xs text-[#6b7280] mb-1.5">Повторите пароль</label>
                <input type="password" value={password2} onChange={(e) => setPassword2(e.target.value)} placeholder="••••••••"
                  className="w-full bg-[#0d0d12] border border-[#2a2a3a] rounded-lg px-3 py-2.5 text-sm text-[#f1f1f5] placeholder:text-[#6b7280] focus:outline-none focus:border-[#4F8EF7]/50" />
              </div>
              {err && (
                <div className="text-xs text-[#ef4444] bg-[#ef4444]/10 border border-[#ef4444]/20 rounded-lg px-3 py-2">
                  {err}
                </div>
              )}
              <button type="submit" disabled={loading || !name || !tg || !password || !password2}
                className="w-full py-2.5 rounded-lg bg-[#4F8EF7] hover:bg-[#3d7ce8] text-white font-semibold text-sm transition disabled:opacity-40 disabled:cursor-not-allowed">
                {loading ? "Создание..." : "Создать аккаунт"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── TopBar ────────────────────────────────────────────────────────────────

    function TopBar({ screen, setScreen, activeName, notifCount, onNotifClick, notifOpen, onProfileClick, profileOpen, onCloseMenus, currentOperator, onLogout, onTogglePause, notifItems, onNotifItemClick, onDismissAll }) {
      const screens = [
        { id: "dialogs",  label: "Диалоги",    icon: "chat"     },
        { id: "stats",    label: "Статистика", icon: "chart"    },
        { id: "settings", label: "Настройки",  icon: "settings" },
      ];
      const breadcrumbMap = {
        dialogs:  ["Диалоги", activeName ? "@" + activeName : null],
        stats:    ["Статистика"],
        settings: ["Настройки"],
      };
      const crumbs = breadcrumbMap[screen].filter(Boolean);

      const opInitials = currentOperator?.initials || "??";
      const opColor    = currentOperator?.color    || "#4F8EF7";
      const opName     = currentOperator?.name     || "Оператор";
      const opTg       = currentOperator?.tg       || "";

      return (
        <header className="h-[56px] shrink-0 bg-[#13131a] border-b border-[#2a2a3a] flex items-center px-3 gap-2 relative z-30">
          <div className="flex items-center gap-2 pr-3 mr-1 border-r border-[#2a2a3a]">
            <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-[#4F8EF7] to-[#A855F7] flex items-center justify-center text-white text-xs font-bold">Х</div>
            <div className="font-semibold text-[#f1f1f5]">Хелпдеск</div>
          </div>

          <nav className="flex items-center gap-0.5">
            {screens.filter(s => s.id !== "stats" || currentOperator?.role === "admin").map((s) => (
              <button
                key={s.id}
                onClick={() => setScreen(s.id)}
                className={
                  "px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5 " +
                  (screen === s.id
                    ? "bg-[#1a1a24] text-[#f1f1f5]"
                    : "text-[#6b7280] hover:text-[#f1f1f5] hover:bg-[#1a1a24]/60")
                }
              >
                <Icon name={s.icon} className="w-3.5 h-3.5" />
                {s.label}
              </button>
            ))}
          </nav>

          <div className="flex items-center gap-2 ml-4 text-sm">
            {crumbs.map((c, i) => (
              <React.Fragment key={i}>
                {i > 0 && <Icon name="chevronRight" className="w-3 h-3 text-[#6b7280]" />}
                <span className={i === crumbs.length - 1 ? "text-[#f1f1f5]" : "text-[#6b7280]"}>{c}</span>
              </React.Fragment>
            ))}
          </div>

          <div className="flex-1" />

          <div className="flex items-center gap-2">
            <button
              onClick={onNotifClick}
              className="relative p-2 text-[#6b7280] hover:text-[#f1f1f5] hover:bg-[#1a1a24] rounded-lg transition"
            >
              <Icon name="bell" className="w-5 h-5" />
              {notifCount > 0 && (
                <span className="absolute top-1 right-1 min-w-[16px] h-[16px] px-1 rounded-full bg-[#ef4444] text-white text-[10px] font-bold flex items-center justify-center ring-2 ring-[#13131a]">
                  {notifCount}
                </span>
              )}
            </button>

            <button
              onClick={onProfileClick}
              className="flex items-center gap-2 pl-1 pr-2 py-1 rounded-lg hover:bg-[#1a1a24] transition"
            >
              <div className="relative">
                <Avatar initials={opInitials} color={opColor} size={28} />
                <span className={"absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full ring-2 ring-[#13131a] " + (currentOperator?.paused ? "bg-[#eab308]" : "bg-[#22c55e]")}></span>
              </div>
              <div className="text-left">
                <div className="text-xs font-medium text-[#f1f1f5] leading-tight">{opName}</div>
                <div className={"flex items-center gap-1 text-[10px] " + (currentOperator?.paused ? "text-[#eab308]" : "text-[#22c55e]")}>
                  <span className={"w-1 h-1 rounded-full " + (currentOperator?.paused ? "bg-[#eab308]" : "bg-[#22c55e]")}></span>
                  {currentOperator?.paused ? "На паузе" : "Онлайн"}
                </div>
              </div>
              <Icon name="chevronDown" className="w-3.5 h-3.5 text-[#6b7280]" />
            </button>
          </div>

          {notifOpen && (
            <>
              <div className="fixed inset-0 z-40" onClick={onCloseMenus}></div>
              <div className="absolute top-[52px] right-[80px] w-[340px] bg-[#13131a] border border-[#2a2a3a] rounded-xl shadow-2xl z-50 overflow-hidden">
                <div className="px-4 py-3 border-b border-[#2a2a3a] flex items-center justify-between">
                  <div className="font-medium text-sm text-[#f1f1f5]">Уведомления</div>
                  {(notifItems || []).length > 0 && (
                    <button onClick={onDismissAll} className="text-[10px] text-[#7BA8F9] hover:underline">Прочитать все</button>
                  )}
                </div>
                <div className="divide-y divide-[#2a2a3a]/60 max-h-[400px] overflow-y-auto scrollbar-thin">
                  {(notifItems || []).length === 0 ? (
                    <div className="px-4 py-8 text-center text-[#6b7280] text-sm">
                      Нет новых уведомлений
                    </div>
                  ) : (notifItems || []).map(c => (
                    <div key={c.id} onClick={() => onNotifItemClick && onNotifItemClick(c.id)} className="px-4 py-3 hover:bg-[#1a1a24] cursor-pointer flex items-start gap-3 transition">
                      <span className="mt-0.5 text-[#ef4444] shrink-0"><Icon name="bellRing" className="w-4 h-4" /></span>
                      <div className="min-w-0">
                        <div className="text-sm text-[#f1f1f5] truncate">{c.name}</div>
                        <div className="text-[11px] text-[#6b7280] truncate">{c.username} · вызвал оператора</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}

          {profileOpen && (
            <>
              <div className="fixed inset-0 z-40" onClick={onCloseMenus}></div>
              <div className="absolute top-[52px] right-3 w-[220px] bg-[#13131a] border border-[#2a2a3a] rounded-xl shadow-2xl z-50 overflow-hidden py-1">
                <div className="px-4 py-3 border-b border-[#2a2a3a]">
                  <div className="text-sm font-medium text-[#f1f1f5]">{opName}</div>
                  <div className="text-[10px] text-[#6b7280] font-mono">{opTg}</div>
                </div>
                <button
                  onClick={() => { onCloseMenus(); setScreen && setScreen("settings"); }}
                  className="w-full text-left px-4 py-2 text-sm text-[#f1f1f5] hover:bg-[#1a1a24] flex items-center justify-between"
                >
                  <span>Профиль</span>
                  <span className={"text-[10px] px-1.5 py-0.5 rounded font-medium " + (currentOperator?.role === "admin" ? "bg-[#4F8EF7]/20 text-[#7BA8F9]" : "bg-[#2a2a3a] text-[#6b7280]")}>
                    {currentOperator?.role === "admin" ? "Админ" : "Агент"}
                  </span>
                </button>
                <button
                  onClick={() => { onCloseMenus(); onTogglePause && onTogglePause(); }}
                  className={"w-full text-left px-4 py-2 text-sm flex items-center justify-between hover:bg-[#1a1a24] " + (currentOperator?.paused ? "text-[#eab308]" : "text-[#f1f1f5]")}
                >
                  <span>{currentOperator?.paused ? "Снять паузу" : "Поставить на паузу"}</span>
                  {currentOperator?.paused && (
                    <span className="text-[10px] px-1.5 py-0.5 rounded bg-[#eab308]/20 text-[#eab308] font-medium">На паузе</span>
                  )}
                </button>
                <button
                  onClick={() => { onCloseMenus(); onLogout(); }}
                  className="w-full text-left px-4 py-2 text-sm text-[#ef4444] hover:bg-[#1a1a24]"
                >
                  Выйти
                </button>
              </div>
            </>
          )}
        </header>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      // "loading" | "setup" | "login" | "app"
      const [authState,       setAuthState]       = useState("loading");
      const [currentOperator, setCurrentOperator] = useState(null);

      const [screen, setScreenRaw] = useState(() => localStorage.getItem("screen") || "dialogs");
      const setScreen = (s) => { localStorage.setItem("screen", s); setScreenRaw(s); };
      const [conversations,   setConversations]   = useState([]);
      const [activeId,        setActiveIdRaw]     = useState(null);
      const setActiveId = (id) => { id ? localStorage.setItem("hd_active", id) : localStorage.removeItem("hd_active"); setActiveIdRaw(id); };
      const [opsState,        setOpsState]        = useState([]);
      const [dataLoading,     setDataLoading]     = useState(false);
      const [notifOpen,       setNotifOpen]       = useState(false);
      const [profileOpen,     setProfileOpen]     = useState(false);
      const [toast,           setToast]           = useState(null);
      const [soundsConfig,    setSoundsConfig]    = useState({});
      const [soundEnabled,    setSoundEnabled]    = useState(true);

      const loadedRef        = useRef(new Set());
      const ticketsLoadedRef = useRef(new Set());
      const wsRef            = useRef(null);
      const pendingDialogRef = useRef(null);
      const soundsConfigRef  = useRef({});
      const soundEnabledRef  = useRef(true);

      function showToast(msg) {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      }

      function playSound(url) {
        if (!url) return;
        try { new Audio(url).play(); } catch {}
      }

      useEffect(() => { soundsConfigRef.current = soundsConfig; }, [soundsConfig]);
      useEffect(() => { soundEnabledRef.current = soundEnabled; }, [soundEnabled]);
      useEffect(() => {
        window._setSoundEnabled = setSoundEnabled;
        window._setSoundsConfig = setSoundsConfig;
        return () => { window._setSoundEnabled = null; window._setSoundsConfig = null; };
      }, []);

      // ── Auth expired callback ─────────────────────────────────────────────

      useEffect(() => {
        _authExpiredCb = () => {
          setCurrentOperator(null);
          setAuthState("login");
        };
        return () => { _authExpiredCb = null; };
      }, []);

      // ── Initial auth check ────────────────────────────────────────────────

      useEffect(() => {
        async function boot() {
          if (_token) {
            try {
              const op = await apiFetch("GET", "/api/auth/me");
              setCurrentOperator(op);
              const urlParams = new URLSearchParams(window.location.search);
              const sharedId = urlParams.get("dialog");
              if (sharedId) {
                pendingDialogRef.current = sharedId;
                window.history.replaceState({}, '', window.location.pathname);
              }
              setAuthState("app");
              return;
            } catch {
              setToken("");
            }
          }
          // No valid token — check if first-time setup is needed
          try {
            const status = await fetch("/api/auth/status").then((r) => r.json());
            setAuthState(status.setup_needed ? "setup" : "login");
          } catch {
            setAuthState("login");
          }
        }
        boot();
      }, []);

      // ── Load app data once authenticated ──────────────────────────────────

      useEffect(() => {
        if (authState !== "app") return;
        setDataLoading(true);
        Promise.all([
          apiGet("/api/dialogs"),
          apiGet("/api/operators").catch(() => []),
          apiGet("/api/settings/sounds").catch(() => ({})),
          apiGet("/api/operators/me/notifications").catch(() => ({})),
        ]).then(async ([dialogs, operators, sounds, notifPrefs]) => {
          const sc = sounds || {};
          const se = notifPrefs?.sound_enabled !== false;
          setSoundsConfig(sc);
          setSoundEnabled(se);
          soundsConfigRef.current = sc;
          soundEnabledRef.current = se;
          const withMessages = dialogs.map((d) => ({ ...d, messages: [], tickets: [] }));
          setConversations(withMessages);
          const pendingId = pendingDialogRef.current;
          const savedId   = localStorage.getItem("hd_active");
          const targetId  = pendingId || savedId;
          if (pendingId) pendingDialogRef.current = null;
          if (targetId) {
            const found = withMessages.find((d) => d.id === targetId);
            if (found) {
              setActiveIdRaw(found.id);
            } else {
              try {
                const dialog = await apiGet(`/api/dialogs/${targetId}`);
                if (dialog) {
                  const enriched = { ...dialog, messages: [], tickets: [] };
                  setConversations((prev) => {
                    const exists = prev.some((c) => c.id === enriched.id);
                    return exists ? prev : [enriched, ...prev];
                  });
                  setActiveIdRaw(enriched.id);
                } else if (withMessages.length > 0) setActiveIdRaw(withMessages[0].id);
              } catch {
                if (withMessages.length > 0) setActiveIdRaw(withMessages[0].id);
              }
            }
          } else if (withMessages.length > 0) {
            setActiveIdRaw(withMessages[0].id);
          }
          setOpsState(operators || []);
        }).catch((e) => console.error("Failed to load initial data:", e))
          .finally(() => setDataLoading(false));
      }, [authState]);

      // ── WebSocket ─────────────────────────────────────────────────────────

      useEffect(() => {
        if (authState !== "app") return;

        let destroyed = false;
        let reconnectTimer = null;
        let pingInterval = null;

        function connect() {
          if (destroyed) return;
          const protocol = location.protocol === "https:" ? "wss:" : "ws:";
          const ws = new WebSocket(`${protocol}//${location.host}/ws?token=${_token}`);
          wsRef.current = ws;
          let pongPending = false;

          ws.onopen = () => {
            pongPending = false;
            pingInterval = setInterval(() => {
              if (pongPending) {
                ws.close();
                return;
              }
              if (ws.readyState === WebSocket.OPEN) {
                pongPending = true;
                ws.send("ping");
              }
            }, 30000);
          };

          ws.onmessage = (event) => {
            if (event.data === "pong") { pongPending = false; return; }
            const data = JSON.parse(event.data);
            if (data.type === "new_message") {
              setConversations((prev) =>
                prev.map((c) => {
                  if (c.id !== data.dialog_id) return c;
                  if (data.message.kind === 'user' && soundEnabledRef.current) playSound(soundsConfigRef.current.new_message_url);
                  return { ...c, messages: [...c.messages, data.message] };
                })
              );
            } else if (data.type === "dialog_updated") {
              setConversations((prev) =>
                prev.map((c) => {
                  if (c.id !== data.dialog.id) return c;
                  if (!c.operatorCalled && data.dialog.operatorCalled && soundEnabledRef.current)
                    playSound(soundsConfigRef.current.operator_called_url);
                  return { ...data.dialog, messages: c.messages, tickets: c.tickets };
                })
              );
            } else if (data.type === "new_dialog") {
              setConversations((prev) => {
                const exists = prev.some((c) => c.id === data.dialog.id);
                if (exists) {
                  return prev.map((c) =>
                    c.id === data.dialog.id
                      ? { ...data.dialog, messages: c.messages, tickets: c.tickets }
                      : c
                  );
                }
                return [{ ...data.dialog, messages: [], tickets: [] }, ...prev];
              });
            } else if (data.type === "operator_status") {
              setOpsState((prev) =>
                prev.map((o) => o.id === data.op_id ? { ...o, online: data.online, paused: data.paused ?? o.paused } : o)
              );
              setCurrentOperator((prev) =>
                prev && prev.id === data.op_id ? { ...prev, paused: data.paused ?? prev.paused } : prev
              );
            }
          };

          ws.onerror = () => ws.close();

          ws.onclose = () => {
            clearInterval(pingInterval);
            pingInterval = null;
            if (!destroyed) {
              reconnectTimer = setTimeout(connect, 3000);
            }
          };
        }

        connect();

        return () => {
          destroyed = true;
          clearTimeout(reconnectTimer);
          clearInterval(pingInterval);
          if (wsRef.current) wsRef.current.close();
        };
      }, [authState]);

      // ── Lazy-load messages + history ──────────────────────────────────────

      useEffect(() => {
        if (!activeId) return;
        if (!loadedRef.current.has(activeId)) {
          loadedRef.current.add(activeId);
          apiGet(`/api/dialogs/${activeId}/messages`)
            .then((msgs) =>
              setConversations((prev) =>
                prev.map((c) => (c.id === activeId ? { ...c, messages: msgs } : c))
              )
            )
            .catch((e) => console.error("Failed to load messages:", e));
        }
        if (!ticketsLoadedRef.current.has(activeId)) {
          ticketsLoadedRef.current.add(activeId);
          apiGet(`/api/dialogs/${activeId}/history`)
            .then((tickets) =>
              setConversations((prev) =>
                prev.map((c) => (c.id === activeId ? { ...c, tickets } : c))
              )
            )
            .catch(() => {});
        }
      }, [activeId]);

      // ── Auth actions ──────────────────────────────────────────────────────

      async function handleLogin(tg, password) {
        const data = await apiFetch("POST", "/api/auth/login", { tg, password });
        setToken(data.token);
        setCurrentOperator(data.operator);
        setAuthState("app");
      }

      async function handleSetup(name, tg, password) {
        const data = await apiFetch("POST", "/api/auth/setup", { name, tg, password });
        setToken(data.token);
        setCurrentOperator(data.operator);
        setAuthState("app");
      }

      async function handleLogout() {
        try { await apiFetch("POST", "/api/auth/logout"); } catch {}
        setToken("");
        setCurrentOperator(null);
        setConversations([]);
        setActiveIdRaw(null);
        loadedRef.current = new Set();
        ticketsLoadedRef.current = new Set();
        if (wsRef.current) wsRef.current.close();
        setAuthState("login");
      }

      // ── API callbacks ─────────────────────────────────────────────────────

      async function handleReply(dialog_id, text, fileArgs) {
        try {
          await apiPost(`/api/dialogs/${dialog_id}/reply`, {
            text,
            operator_name: currentOperator?.name || "Оператор",
            ...(fileArgs || {}),
          });
        } catch (e) {
          console.error("Reply failed:", e);
          showToast("Ошибка отправки сообщения");
        }
      }

      async function handleToggleAI(dialog_id) {
        try {
          return await apiPost(`/api/dialogs/${dialog_id}/toggle_ai`);
        } catch (e) {
          console.error("Toggle AI failed:", e);
          showToast("Ошибка переключения ИИ");
          return null;
        }
      }

      async function handleClose(dialog_id) {
        try {
          await apiPost(`/api/dialogs/${dialog_id}/close`);
        } catch (e) {
          console.error("Close failed:", e);
        }
      }

      async function handleHandoff(dialog_id) {
        try {
          await apiPost(`/api/dialogs/${dialog_id}/handoff`, {
            operator_name: currentOperator?.name || "Оператор",
          });
        } catch (e) {
          console.error("Handoff failed:", e);
        }
      }

      async function handleReopen(dialog_id) {
        try {
          await apiPost(`/api/dialogs/${dialog_id}/reopen`);
        } catch (e) {
          console.error("Reopen failed:", e);
        }
      }

      async function handleTogglePause() {
        const newPaused = !(currentOperator?.paused ?? false);
        try {
          await apiFetch("PATCH", "/api/operators/me/pause", { paused: newPaused });
          setCurrentOperator(prev => prev ? { ...prev, paused: newPaused } : prev);
          showToast(newPaused ? "Пауза включена — новые тикеты не поступают" : "Пауза снята — принимаете тикеты");
        } catch {
          showToast("Ошибка переключения паузы");
        }
      }

      async function handleBillingAction(dialog_id, action, params) {
        try {
          await apiPost(`/api/dialogs/${dialog_id}/billing/${action}`, params || {});
          const labels = { renew: "Подписка продлена", buy_traffic: "Трафик докуплен", reset_key: "Ключ сброшен" };
          showToast(labels[action] || "Готово");
        } catch (e) {
          console.error("Billing action failed:", e);
          showToast("Ошибка выполнения действия");
        }
      }

      // ── Render ────────────────────────────────────────────────────────────

      if (authState === "loading") {
        return (
          <div className="h-full flex items-center justify-center bg-[#0d0d12]">
            <div className="text-[#6b7280] text-sm">Загрузка...</div>
          </div>
        );
      }

      if (authState === "setup") {
        return <SetupScreen onSetup={handleSetup} />;
      }

      if (authState === "login") {
        return <LoginScreen onLogin={handleLogin} />;
      }

      const active      = conversations.find((c) => c.id === activeId);
      const notifItems  = conversations.filter((c) => c.operatorCalled && c.status !== "closed");
      const notifCount  = notifItems.length;

      const handleNotifItemClick = (id) => {
        setActiveId(id);
        setScreen("dialogs");
        setNotifOpen(false);
        setProfileOpen(false);
      };

      const handleDismissAll = async () => {
        for (const c of notifItems) {
          await apiFetch("POST", `/api/dialogs/${c.id}/dismiss_called`);
        }
        setNotifOpen(false);
        setProfileOpen(false);
      };

      if (dataLoading) {
        return (
          <div className="h-full flex items-center justify-center bg-[#0d0d12]">
            <div className="text-[#6b7280] text-sm">Загрузка...</div>
          </div>
        );
      }

      return (
        <div className="h-full flex flex-col">
          <TopBar
            screen={screen}
            setScreen={setScreen}
            activeName={screen === "dialogs" && active ? active.username?.replace("@", "") : null}
            notifCount={notifCount}
            onNotifClick={() => { setNotifOpen((v) => !v); setProfileOpen(false); }}
            notifOpen={notifOpen}
            onProfileClick={() => { setProfileOpen((v) => !v); setNotifOpen(false); }}
            profileOpen={profileOpen}
            onCloseMenus={() => { setNotifOpen(false); setProfileOpen(false); }}
            currentOperator={currentOperator}
            onLogout={handleLogout}
            onTogglePause={handleTogglePause}
            notifItems={notifItems}
            onNotifItemClick={handleNotifItemClick}
            onDismissAll={handleDismissAll}
          />
          <main className="flex-1 min-h-0">
            <div className={"h-full " + (screen !== "dialogs" ? "hidden" : "")}>
              <DialogsScreen
                conversations={conversations}
                setConversations={setConversations}
                activeId={activeId}
                setActiveId={setActiveId}
                showToast={showToast}
                onReply={handleReply}
                onToggleAI={handleToggleAI}
                onClose={handleClose}
                onHandoff={handleHandoff}
                onReopen={handleReopen}
                onBillingAction={handleBillingAction}
                currentOperator={currentOperator}
                operators={opsState}
                servers={[]}
              />
            </div>
            <div className={"h-full " + (screen !== "stats" ? "hidden" : "")}>
              <StatisticsScreen />
            </div>
            <div className={"h-full " + (screen !== "settings" ? "hidden" : "")}>
              <SettingsScreen operators={opsState} setOperators={setOpsState} showToast={showToast} currentOperator={currentOperator} />
            </div>
          </main>
          <Toast msg={toast} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
